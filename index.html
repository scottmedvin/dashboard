<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dashboard</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f4f6f9; --surface: #ffffff; --border: #e2e6ea;
            --accent: #2563eb; --accent2: #16a34a; --text: #1e293b;
            --sub: #64748b; --danger: #dc2626; --radius: 12px;
            --shadow: 0 1px 4px rgba(0,0,0,.08);
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100%; font-size: 14px; }
        .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .topbar-left { display: flex; align-items: center; gap: 16px; }
        .topbar-logo { font-weight: 700; font-size: 18px; color: var(--accent); letter-spacing: -.5px; }
        #liveClock { font-size: 13px; color: var(--sub); font-variant-numeric: tabular-nums; }
        .topbar-right { display: flex; align-items: center; gap: 10px; }
        .btn { padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 13px; cursor: pointer; transition: background .15s, border-color .15s; }
        .btn:hover { background: var(--bg); }
        .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn-primary:hover { background: #1d4ed8; }
        .btn:disabled { opacity: .45; cursor: not-allowed; }
        #authStatus { font-size: 12px; color: var(--sub); }
        .main { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
        @media (max-width: 1100px) { .grid { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px 20px; display: flex; flex-direction: column; gap: 12px; }
        .card-header { display: flex; align-items: center; justify-content: space-between; }
        .card-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--sub); }
        .card-badge { font-size: 11px; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 2px 8px; color: var(--sub); }
        .focus-card { grid-column: 1 / -1; }
        .focus-date { font-size: 22px; font-weight: 700; }
        .focus-sub { font-size: 13px; color: var(--sub); margin-top: 2px; }
        .focus-input, .notes-area {
            width: 100%; border: 1px solid var(--border); border-radius: 8px;
            padding: 10px 12px; font-size: 14px; font-family: inherit;
            color: var(--text); background: var(--bg); resize: vertical; line-height: 1.6;
        }
        .focus-input { min-height: 52px; resize: none; }
        .notes-area { min-height: 160px; }
        .focus-input:focus, .notes-area:focus { outline: none; border-color: var(--accent); }
        .task-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .task-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border); }
        .task-item:hover { background: var(--bg); }
        #newsTicker { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; margin-top: 8px; font-size: 13px; color: var(--sub); }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-left">
            <div class="topbar-logo">Dashboard</div>
            <div id="liveClock"></div>
        </div>
        <div class="topbar-right">
            <button class="btn" onclick="handleSignIn()" id="signInBtn" disabled>Sign In</button>
            <button class="btn btn-primary" onclick="handleSignOut()" id="signOutBtn" style="display:none;">Sign Out</button>
            <div id="authStatus">Loading...</div>
        </div>
    </div>

    <div class="main">
        <div class="grid">
            <div class="card focus-card">
                <div class="card-header">
                    <div class="card-title">Today's Focus</div>
                </div>
                <div class="focus-date" id="todayDate">Loading...</div>
                <div class="focus-sub" id="todayGreeting"></div>
                <textarea class="focus-input" id="focusInput" placeholder="What's your main focus today?"></textarea>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title">Tasks</div>
                    <div class="card-badge" id="taskCount">0</div>
                </div>
                <ul class="task-list" id="taskList"></ul>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title">Calendar</div>
                </div>
                <div id="calendarEvents">Sign in to view your calendar events.</div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title">Notes</div>
                </div>
                <textarea class="notes-area" id="notesArea" placeholder="Quick notes..."></textarea>
            </div>
        </div>

        <div id="newsTicker">Dashboard ready. Sign in with Google to access your calendar.</div>
    </div>

    <script src="https://apis.google.com/js/api.js"></script>
    <script>
        // Google API Configuration
        const CLIENT_ID = '493713294892-7hjec2ik81ll3ophl85uhujj5ositfk8.apps.googleusercontent.com';
        const API_KEY = 'AIzaSyDlk49y0A2ovh-vwTDxIpbEQPzNJqRGEQA';
        const DISCOVERY_DOCS = ['https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest'];
        const SCOPES = 'https://www.googleapis.com/auth/calendar.readonly';

        let gapiInited = false;
        let gisInited = false;
        let tokenClient;

        // Initialize Google API
        function gapiLoaded() {
            gapi.load('client', initializeGapiClient);
        }

        async function initializeGapiClient() {
            await gapi.client.init({
                apiKey: API_KEY,
                discoveryDocs: DISCOVERY_DOCS,
            });
            gapiInited = true;
            maybeEnableButtons();
        }

        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: '', // defined later
            });
            gisInited = true;
            maybeEnableButtons();
        }

        function maybeEnableButtons() {
            if (gapiInited && gisInited) {
                document.getElementById('signInBtn').disabled = false;
                document.getElementById('authStatus').textContent = 'Ready';
            }
        }

        function handleSignIn() {
            tokenClient.callback = async (resp) => {
                if (resp.error !== undefined) {
                    throw (resp);
                }
                document.getElementById('signInBtn').style.display = 'none';
                document.getElementById('signOutBtn').style.display = 'inline-block';
                document.getElementById('authStatus').textContent = 'Signed In';
                await listUpcomingEvents();
            };

            if (gapi.client.getToken() === null) {
                tokenClient.requestAccessToken({prompt: 'consent'});
            } else {
                tokenClient.requestAccessToken({prompt: ''});
            }
        }

        function handleSignOut() {
            const token = gapi.client.getToken();
            if (token !== null) {
                google.accounts.oauth2.revoke(token.access_token);
                gapi.client.setToken('');
            }
            document.getElementById('signInBtn').style.display = 'inline-block';
            document.getElementById('signOutBtn').style.display = 'none';
            document.getElementById('authStatus').textContent = 'Signed Out';
            document.getElementById('calendarEvents').innerHTML = 'Sign in to view your calendar events.';
        }

      async function listUpcomingEvents() {
  let response;
  try {
    const request = {
      calendarId: 'primary',
      timeMin: (new Date()).toISOString(),
      showDeleted: false,
      singleEvents: true,
      maxResults: 10,
      orderBy: 'startTime',
    };
    response = await gapi.client.calendar.events.list(request);
  } catch (err) {
    console.error('Calendar API error:', err);
    const msg =
      (err.result && err.result.error && err.result.error.message)
        ? err.result.error.message
        : (err.message || 'Unknown error');
    document.getElementById('calendarEvents').innerHTML =
      'Error loading calendar: ' + msg;
    return;
  }

  const events = response.result.items;
  if (!events || events.length === 0) {
    document.getElementById('calendarEvents').innerHTML =
      'No upcoming events found.';
    return;
  }

  const output = events.map(event => {
    const when = event.start.dateTime || event.start.date;
    const date = new Date(when);
    const timeStr = event.start.dateTime
      ? date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })
      : 'All day';
    return `<div style="padding: 8px 0; border-bottom: 1px solid var(--border);">
      <div style="font-weight: 600; color: var(--text);">${event.summary}</div>
      <div style="font-size: 12px; color: var(--sub); margin-top: 2px;">${timeStr}</div>
    </div>`;
  }).join('');
  document.getElementById('calendarEvents').innerHTML = output;
}

        // Clock
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', {hour: 'numeric', minute: '2-digit', second: '2-digit'});
            document.getElementById('liveClock').textContent = timeStr;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Date and greeting
        function updateDate() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('todayDate').textContent = now.toLocaleDateString('en-US', options);
            
            const hour = now.getHours();
            let greeting = 'Good morning';
            if (hour >= 12 && hour < 18) greeting = 'Good afternoon';
            if (hour >= 18) greeting = 'Good evening';
            document.getElementById('todayGreeting').textContent = greeting;
        }
        updateDate();

        // Local storage for focus and notes
        const focusInput = document.getElementById('focusInput');
        const notesArea = document.getElementById('notesArea');

        focusInput.value = localStorage.getItem('focusText') || '';
        notesArea.value = localStorage.getItem('notesText') || '';

        focusInput.addEventListener('input', () => {
            localStorage.setItem('focusText', focusInput.value);
        });

        notesArea.addEventListener('input', () => {
            localStorage.setItem('notesText', notesArea.value);
        });

    </script>
</body>
    <!-- Google APIs -->
<script src="https://apis.google.com/js/api.js" async defer onload="gapiLoaded()"></script>
<script src="https://accounts.google.com/gsi/client" async defer onload="gisLoaded()"></script>
</html>
